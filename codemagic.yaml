workflows:
  ios-build:
    name: iOS Build
    environment:
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
      xcode: latest
      cocoapods: default
      java: 17
    scripts:
      - name: Set up local properties
        script: |
          echo "sdk.dir=\C:\Users\ozbayv/Library/Android/sdk" > local.properties
      - name: Build iOS
        script: |
          cd iosApp
          xcodebuild build -project iosApp.xcodeproj -scheme iosApp -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' | xcpretty
    artifacts:
      - build/ios/iphonesimulator/**/*.app
